<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咱兜的台語 - 全台戰情室首頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #2F4F2F; color: #F5F5DC; overflow-x: hidden; }
        .gold-text { color: #D4AF37; }
        .gold-border { border-color: #D4AF37; }
        .bg-dark-green { background-color: #1A361A; }
        .stat-card { background: linear-gradient(145deg, #1A361A, #244224); border: 1px solid rgba(212, 175, 55, 0.2); }
        .glow { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .btn-nav { transition: all 0.2s ease; background: rgba(212, 175, 55, 0.15); }
        .btn-nav:hover { background: rgba(212, 175, 55, 0.3); transform: scale(0.95); }
        
        /* 戰情室專用地圖濾鏡 */
        .leaflet-container { background: #1a361a !important; border-radius: 1rem; }
        .leaflet-tile-container { filter: brightness(0.5) invert(1) contrast(1.2) sepia(0.5) hue-rotate(80deg); }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b gold-border pb-6">
        <div class="text-left flex items-start gap-3">
            <a href="index.html" class="btn-nav border gold-border px-2 py-1 rounded flex items-center gap-1 mt-1 shadow-sm">
                <span class="text-xs">🏠</span>
                <span class="text-[9px] gold-text font-bold uppercase">Home</span>
            </a>

            <div>
                <h1 class="text-2xl md:text-3xl font-bold gold-text tracking-widest glow">全台戰情室首頁</h1>
                <p class="text-[10px] md:text-xs opacity-60 mt-1 italic">數據即時觀測 · 彰化示範區</p>
            </div>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 w-full lg:w-auto">
            <div class="stat-card p-2 px-4 rounded-lg text-center">
                <p class="text-[8px] opacity-60 uppercase">總參與家庭</p>
                <p class="text-lg font-mono gold-text font-bold">1,280</p>
            </div>
            <div class="stat-card p-2 px-4 rounded-lg text-center">
                <p class="text-[8px] opacity-60 uppercase">活躍社團</p>
                <p class="text-lg font-mono gold-text font-bold">42</p>
            </div>
            <div class="stat-card p-2 px-4 rounded-lg text-center">
                <p class="text-[8px] opacity-60 uppercase">今日打卡</p>
                <p class="text-lg font-mono text-green-400 font-bold">542</p>
            </div>
            <div class="stat-card p-2 px-4 rounded-lg text-center">
                <p class="text-[8px] opacity-60 uppercase">總積分</p>
                <p class="text-lg font-mono text-yellow-400 font-bold">852K</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-8 bg-dark-green rounded-2xl border gold-border/20 overflow-hidden relative min-h-[400px] shadow-2xl">
            <div class="absolute top-3 left-3 z-[1000] bg-black/80 p-2 px-3 rounded border gold-border/30 text-[10px] pointer-events-none">
                <h3 class="gold-text font-bold mb-1">區域：彰化市中心</h3>
                <div class="flex gap-3 opacity-90">
                    <span class="flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-1"></span> 教會</span>
                    <span class="flex items-center"><span class="w-2 h-2 rounded-full bg-blue-500 mr-1"></span> 園區</span>
                </div>
            </div>
            <div id="map" class="w-full h-full" style="min-height: 400px;"></div>
        </div>

        <div class="lg:col-span-4 space-y-4">
            <section class="bg-dark-green p-4 rounded-xl border border-white/10">
                <h3 class="text-sm font-bold gold-text mb-3 flex items-center">🏛️ 社團大榜 (彰化)</h3>
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between border-b border-white/5 pb-1">
                        <span class="text-yellow-500">01</span>
                        <span class="flex-1 ml-2">彰化長老教會</span>
                        <span class="font-mono gold-text">12,540</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">02</span>
                        <span class="flex-1 ml-2">台語文創意園區</span>
                        <span class="font-mono gold-text">11,210</span>
                    </div>
                </div>
            </section>

            <section class="bg-dark-green p-4 rounded-xl border border-white/10">
                <h3 class="text-sm font-bold gold-text mb-3 flex items-center">🏆 領先家庭</h3>
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between border-b border-white/5 pb-1">
                        <span class="text-yellow-500">01</span>
                        <span class="flex-1 ml-2">陳仕賢 家庭</span>
                        <span class="font-mono gold-text">2,540</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">02</span>
                        <span class="flex-1 ml-2">李續命 家庭</span>
                        <span class="font-mono gold-text">2,320</span>
                    </div>
                </div>
            </section>
        </div>

        <div class="lg:col-span-12 bg-black/30 p-2 px-4 rounded-lg border gold-border/10 flex items-center gap-4 overflow-hidden">
            <span class="text-red-500 text-[9px] font-bold animate-pulse whitespace-nowrap">● LIVE</span>
            <marquee class="text-[10px] opacity-60">
                [14:15] 陳仕賢 家庭 完成打卡 (+10分) &nbsp;&nbsp; | &nbsp;&nbsp; 
                [14:10] 台語文創意園區 總積分突破 11,000 &nbsp;&nbsp; | &nbsp;&nbsp; 
                [13:55] 管理員已核准新節點：員林路教會
            </marquee>
        </div>
    </div>

    <script>
        // 使用 setTimeout 確保容器寬高已就緒
        setTimeout(() => {
            const map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([24.075, 120.544], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // 僅顯示彰化市中心 2 個代表節點
            const demoNodes = [
                { pos: [24.0815, 120.5385], color: "#22c55e", title: "彰化長老教會" },
                { pos: [24.0725, 120.5512], color: "#3b82f6", title: "台語文創意園區" }
            ];

            demoNodes.forEach(node => {
                L.circleMarker(node.pos, {
                    radius: 9,
                    fillColor: node.color,
                    color: "#D4AF37",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map).bindPopup(`<b style="color:#1A361A">${node.title}</b>`);
            });
        }, 300);
    </script>
</body>
</html>
