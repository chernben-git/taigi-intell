<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咱兜的台語 - 全台戰情室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-dim: rgba(212,175,55,0.3);
            --dark: #1A361A;
            --bg: #0f2210;
            --surface: #162b16;
            --green-glow: rgba(34,197,94,0.15);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg);
            color: #e8e8d8;
            overflow-x: hidden;
            margin: 0;
        }

        /* ── 掃描線效果 ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        .gold { color: var(--gold); }
        .gold-border { border-color: var(--gold); }
        .mono { font-family: 'Share Tech Mono', monospace; }

        /* ── KPI 卡 ── */
        .kpi-card {
            background: var(--surface);
            border: 1px solid var(--gold-dim);
            border-radius: 8px;
            padding: 12px 16px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--gold);
        }
        .kpi-card:hover { border-color: var(--gold); }
        .kpi-value { font-family: 'Share Tech Mono', monospace; font-size: 1.6rem; color: var(--gold); line-height: 1; }
        .kpi-label { font-size: 0.65rem; opacity: 0.55; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
        .kpi-sub { font-size: 0.7rem; color: #4ade80; margin-top: 2px; font-family: 'Share Tech Mono', monospace; }

        /* ── 地圖容器 ── */
        .leaflet-container { background: #0a1a0a !important; border-radius: 12px; }
        /* .leaflet-tile-container { filter: brightness(0.45) saturate(0.3) hue-rotate(80deg); } */
        /* 縮放控制移右側 */
        .leaflet-top.leaflet-left { left: auto; right: 10px; }
        /* 手機響應式 */
        @media (max-width: 768px) {
            #main-grid {
                grid-template-columns: 1fr !important;
            }
            #map-container {
                grid-column: 1 !important;
                grid-row: 1 !important;
                min-height: 300px !important;
            }
            #map { min-height: 300px !important; height: 300px !important; }
            #social-col { grid-column: 1 !important; grid-row: 2 !important; }
            #family-col  { grid-column: 1 !important; grid-row: 3 !important; }
            #bottom-grid {
                grid-column: 1 !important;
                grid-row: 4 !important;
                grid-template-columns: 1fr !important;
            }
        }
        .leaflet-popup-content-wrapper {
            background: var(--dark);
            color: #e8e8d8;
            border: 1px solid var(--gold);
            border-radius: 6px;
        }
        .leaflet-popup-tip { background: var(--dark); }

        /* ── 排行榜 ── */
        .rank-row {
            display: flex;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .rank-row:hover { background: rgba(212,175,55,0.05); }
        .rank-num { width: 28px; font-family: 'Share Tech Mono', monospace; color: rgba(212,175,55,0.5); font-size: 0.75rem; }
        .rank-num.top1 { color: #FFD700; }
        .rank-num.top2 { color: #C0C0C0; }
        .rank-num.top3 { color: #CD7F32; }
        .rank-score { margin-left: auto; font-family: 'Share Tech Mono', monospace; color: var(--gold); font-size: 0.8rem; }

        /* ── 跑馬燈 ── */
        .ticker-wrap { overflow: hidden; white-space: nowrap; }
        .ticker-inner { display: inline-block; animation: ticker 30s linear infinite; }
        @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* ── 脈衝點 ── */
        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* ── 按鈕 ── */
        .btn-nav {
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            letter-spacing: 0.1em;
        }
        .btn-nav:hover { border-color: var(--gold); background: rgba(212,175,55,0.1); }

        /* ── 區塊標題 ── */
        .section-title {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gold-dim);
        }

        /* ── 載入動畫 ── */
        .loading-spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--gold-dim);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 進度條 ── */
        .progress-bar {
            height: 3px;
            background: var(--gold-dim);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 2px;
            transition: width 1s ease;
        }

        /* ── 節點標記自訂 ── */
        .node-label {
            background: rgba(26,54,26,0.9);
            border: 1px solid var(--gold);
            color: #e8e8d8;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            white-space: nowrap;
        }

        /* 我的標記 */
        .my-mark { display:inline-block; background:var(--gold); color:#1A361A; font-size:9px; font-weight:bold; padding:1px 5px; border-radius:3px; margin-left:6px; vertical-align:middle; }
        .rank-row.mine { background: rgba(212,175,55,0.08); border-left: 2px solid var(--gold); }
        /* 我的節點星號 */
        .my-node-marker { filter: drop-shadow(0 0 6px #D4AF37); }

        @media (max-width: 768px) {
            .kpi-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- ══ HEADER ══════════════════════════════════════════ -->
    <header style="padding: 12px 20px; border-bottom: 1px solid var(--gold-dim); background: rgba(15,34,16,0.98); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 1000;">
        <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;">
            
            <div style="display: flex; align-items: center; gap: 12px;">
                <a href="index.html" class="btn-nav">🏠 首頁</a>
                <div>
                    <div style="font-size: 1rem; font-weight: bold; color: var(--gold); letter-spacing: 0.2em;">全台戰情室</div>
                    <div style="font-size: 0.6rem; opacity: 0.45; letter-spacing: 0.1em;">NATIONAL OPERATIONS CENTER</div>
                </div>
            </div>

            <!-- KPI 快覽 -->
            <div style="display: flex; gap: 8px; flex-wrap: wrap;" id="header-kpi">
                <div class="kpi-card" style="min-width: 90px;">
                    <div class="kpi-value" id="kpi-families">—</div>
                    <div class="kpi-label">參與家庭</div>
                </div>
                <div class="kpi-card" style="min-width: 90px;">
                    <div class="kpi-value" id="kpi-checkins">—</div>
                    <div class="kpi-label">今日打卡</div>
                    <div class="kpi-sub" id="kpi-checkins-sub"></div>
                </div>
                <div class="kpi-card" style="min-width: 90px;">
                    <div class="kpi-value" id="kpi-learning">—</div>
                    <div class="kpi-label">學習紀錄</div>
                </div>
                <div class="kpi-card" style="min-width: 90px;">
                    <div class="kpi-value" id="kpi-nodes">—</div>
                    <div class="kpi-label">台語節點</div>
                </div>
            </div>

            <!-- 狀態 -->
            <div style="font-size: 0.65rem; opacity: 0.5; text-align: right;">
                <div style="display: flex; align-items: center; gap: 6px; justify-content: flex-end;">
                    <span class="pulse-dot" id="status-dot" style="background: #555;"></span>
                    <span id="status-text">資料載入中...</span>
                </div>
                <div id="last-updated" style="margin-top: 2px; font-family: 'Share Tech Mono', monospace;"></div>
            </div>
        </div>
    </header>

    <!-- ══ MAIN ══════════════════════════════════════════ -->
    <main id="main-grid" style="max-width: 1400px; margin: 0 auto; padding: 16px 20px; display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto auto auto; gap: 16px;">

        <!-- 地圖 -->
        <div id="map-container" style="grid-column: 1; grid-row: 1 / 3; background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 12px; overflow: hidden; min-height: 480px; position: relative;">
            <div style="position: absolute; top: 12px; left: 12px; z-index: 1000; background: rgba(15,34,16,0.9); border: 1px solid var(--gold-dim); padding: 8px 12px; border-radius: 6px; font-size: 0.65rem; pointer-events: none;">
                <div style="color: var(--gold); font-weight: bold; margin-bottom: 4px; letter-spacing: 0.1em;">台語友善節點地圖</div>
                <div style="display: flex; gap: 10px; opacity: 0.7;">
                    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block;"></span>教會</span>
                    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; display: inline-block;"></span>文化</span>
                    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; display: inline-block;"></span>其他</span>
                </div>
            </div>
            <div id="map" style="width: 100%; height: 100%; min-height: 480px;"></div>
        </div>

        <!-- 右欄：社團排行 -->
        <div id="social-col" style="grid-column: 2; grid-row: 1; background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 16px;">
            <div class="section-title">🏛️ 社團積分榜</div>
            <div id="social-ranking">
                <div style="text-align: center; padding: 20px; opacity: 0.4;"><span class="loading-spinner"></span></div>
            </div>
        </div>

        <!-- 右欄：家庭排行 -->
        <div id="family-col" style="grid-column: 2; grid-row: 2; background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 16px;">
            <div class="section-title">🏆 家庭積分榜</div>
            <div id="family-ranking">
                <div style="text-align: center; padding: 20px; opacity: 0.4;"><span class="loading-spinner"></span></div>
            </div>
        </div>

        <!-- 底部：活動分佈 + 熱門地點 -->
        <div id="bottom-grid" style="grid-column: 1 / 3; grid-row: 3; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">

            <div style="background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 16px;">
                <div class="section-title">📊 學習活動分佈</div>
                <div id="activity-breakdown">
                    <div style="text-align: center; padding: 20px; opacity: 0.4;"><span class="loading-spinner"></span></div>
                </div>
            </div>

            <div style="background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 16px;">
                <div class="section-title">📍 熱門打卡場所</div>
                <div id="top-places">
                    <div style="text-align: center; padding: 20px; opacity: 0.4;"><span class="loading-spinner"></span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- ══ 跑馬燈 ══════════════════════════════════════════ -->
    <footer style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,26,10,0.95); border-top: 1px solid var(--gold-dim); padding: 6px 0; z-index: 1000;">
        <div style="display: flex; align-items: center; gap: 12px; padding: 0 16px;">
            <span style="color: #ef4444; font-size: 0.65rem; font-weight: bold; letter-spacing: 0.1em; white-space: nowrap; display: flex; align-items: center; gap: 4px;">
                <span class="pulse-dot" style="width: 6px; height: 6px; background: #ef4444;"></span> LIVE
            </span>
            <div class="ticker-wrap" style="flex: 1; font-size: 0.7rem; opacity: 0.55; font-family: 'Share Tech Mono', monospace;">
                <div class="ticker-inner" id="ticker-content">
                    載入中... &nbsp;&nbsp;&nbsp;
                </div>
            </div>
        </div>
    </footer>

    <div style="height: 40px;"></div><!-- footer 墊高 -->

    <script>
    // ══ 設定 ════════════════════════════════════════════════
    // ⚠️ 替換為你的 GAS Web App URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwDv3vDAqSDd0KiJvqg78GsFGVOySMAgP1UFNfyH_I4a7JxMGS0AD1jVPl3ymFQWrM1lA/exec';

    // 若無法連 GAS，使用此 fallback 資料（根據真實 xlsx 預設）
    const FALLBACK_DATA = {
        success: true,
        generatedAt: '2026-03-08 (fallback)',
        kpi: {
            familyCount: 5,
            todayActiveCount: 1,
            totalCheckins: 62,
            todayCheckins: 1,
            totalLearning: 436,
            todayLearning: 0,
            avgStreakDays: 1.8,
            nodeCount: 4,
            totalRadioMin: 43,
        },
        nodes: [
            { nodeId: 'NODE-002', name: '永福教會',     category: 'church', lat: 24.0799, lng: 120.5450, score: 8.1,  desc: '主日禮拜全台語' },
            { nodeId: 'NODE-003', name: '台語文創意園區', category: 'park',   lat: 24.0775, lng: 120.5574, score: 10.5, desc: '台語文化園區學習場所' },
            { nodeId: 'NODE-004', name: '彰化教會',     category: 'church', lat: 24.0786, lng: 120.5392, score: 7.2,  desc: '主日禮拜全台語' },
            { nodeId: 'NODE-005', name: '北斗教會',     category: 'church', lat: 23.8703, lng: 120.5254, score: 6.8,  desc: '主日禮拜全程台語' },
        ],
        socialRanking: [
            { name: '台語文創意園區', score: 2840 },
            { name: '彰化教會',       score: 1560 },
        ],
        familyRanking: [
            { name: '陳冰',  score: 2840 },
            { name: '陳仕賓', score: 520 },
        ],
        topPlaces: [
            { name: '台語文創意園區', count: 18 },
            { name: '台語文化讀書會', count: 17 },
            { name: '彰化東門長老教會', count: 4 },
            { name: '員林長老教會', count: 5 },
            { name: '台中台語社區大學', count: 3 },
        ],
        activityBreakdown: {
            reading_text: 320,
            audio_recording: 80,
            video_watch: 36,
        }
    };

    // ══ 地圖初始化 ═══════════════════════════════════════════
    let map;
    setTimeout(() => {
        map = L.map('map', {
            zoomControl: true,
            attributionControl: false,
        }).setView([24.0785, 120.5435], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }, 200);

    function categoryColor(cat) {
        if (cat === 'church') return '#22c55e';
        if (cat === 'park' || cat === 'store') return '#3b82f6';
        return '#f59e0b';
    }

    function renderNodes(nodes) {
        if (!map) return;
        nodes.forEach(node => {
            const circle = L.circleMarker([node.lat, node.lng], {
                radius: 10,
                fillColor: categoryColor(node.category),
                color: '#D4AF37',
                weight: 1.5,
                opacity: 1,
                fillOpacity: 0.85
            }).addTo(map);

            circle.bindPopup(`
                <div style="font-size:13px;">
                    <div style="color:#D4AF37; font-weight:bold; margin-bottom:4px;">${node.name}</div>
                    <div style="opacity:0.8; margin-bottom:4px;">${node.desc || ''}</div>
                    <div style="font-size:11px; opacity:0.5;">評分：${node.score.toFixed(1)} / 100</div>
                </div>
            `);
        });

        // 自動調整視野
        if (nodes.length > 0) {
            const bounds = L.latLngBounds(nodes.map(n => [n.lat, n.lng]));
            map.fitBounds(bounds, { padding: [40, 40] });
        }
    }

    // ══ 渲染函式 ═════════════════════════════════════════════
    function renderKPI(kpi) {
        document.getElementById('kpi-families').textContent  = kpi.familyCount;
        document.getElementById('kpi-checkins').textContent  = kpi.todayCheckins;
        document.getElementById('kpi-checkins-sub').textContent = `累計 ${kpi.totalCheckins}`;
        document.getElementById('kpi-learning').textContent  = kpi.totalLearning;
        document.getElementById('kpi-nodes').textContent     = kpi.nodeCount;
    }

    function renderRanking(containerId, data, maxScore, myName) {
        const el = document.getElementById(containerId);
        if (!data || data.length === 0) {
            el.innerHTML = '<div style="opacity:0.4; text-align:center; padding:12px; font-size:0.8rem;">暫無資料</div>';
            return;
        }
        el.innerHTML = data.map((item, i) => {
            const pct = maxScore > 0 ? (item.score / maxScore * 100) : 0;
            const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
            const isMe = myName && item.name === myName;
            return `
                <div class="rank-row${isMe ? ' mine' : ''}">
                    <span class="rank-num ${rankClass}">${String(i+1).padStart(2,'0')}</span>
                    <span style="flex:1; padding: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.name}${isMe ? '<span class="my-mark">我</span>' : ''}</span>
                    <span class="rank-score">${item.score.toLocaleString()}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            `;
        }).join('');
    }

    function renderActivityBreakdown(data) {
        const el = document.getElementById('activity-breakdown');
        if (!data || Object.keys(data).length === 0) {
            el.innerHTML = '<div style="opacity:0.4; text-align:center; padding:12px;">暫無資料</div>';
            return;
        }

        // 合併同類型 → 六大類
        const mergeMap = {
            '📖 閱讀學習': ['reading_text','reading_started','reading_completed','content_view','book_opened','book_reading'],
            '🎙️ 語音朗讀': ['audio_recording','checkin_audio','audio_listening','audio_confirmed'],
            '🖼️ 圖片學習': ['image_view','image_viewing','image_confirmed'],
            '📺 影片觀看': ['video_watch','video_watching'],
            '📻 廣播收聽': ['radio_listen','radio_listening'],
            '📍 打卡活動': ['checkin','location_checkin','checkin_completed'],
        };

        const merged = {};
        for (const [label, keys] of Object.entries(mergeMap)) {
            const total = keys.reduce((s, k) => s + (data[k] || 0), 0);
            if (total > 0) merged[label] = total;
        }
        // 未對應的 key 歸入「其他」
        const mappedKeys = Object.values(mergeMap).flat();
        let otherTotal = 0;
        for (const [k, v] of Object.entries(data)) {
            if (!mappedKeys.includes(k)) otherTotal += v;
        }
        if (otherTotal > 0) merged['⚙️ 其他活動'] = otherTotal;

        const entries = Object.entries(merged).sort((a,b) => b[1]-a[1]);
        const maxVal  = entries[0]?.[1] || 1;

        el.innerHTML = entries.map(([label, count]) => {
            const pct = (count / maxVal * 100).toFixed(0);
            return `
                <div style="margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 4px;">
                        <span>${label}</span>
                        <span class="mono" style="color: var(--gold);">${count}</span>
                    </div>
                    <div class="progress-bar" style="height: 4px;">
                        <div class="progress-fill" style="width:${pct}%"></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderTopPlaces(data) {
        const el = document.getElementById('top-places');
        if (!data || data.length === 0) {
            el.innerHTML = '<div style="opacity:0.4; text-align:center; padding:12px;">暫無資料</div>';
            return;
        }
        const maxCount = data[0]?.count || 1;
        el.innerHTML = data.map((place, i) => {
            const pct = (place.count / maxCount * 100).toFixed(0);
            return `
                <div style="margin-bottom: 10px;">
                    <div style="display: flex; gap: 8px; align-items: center; font-size: 0.78rem; margin-bottom: 4px;">
                        <span style="color: var(--gold); font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; width:18px;">${i+1}</span>
                        <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${place.name}</span>
                        <span class="mono" style="color: var(--gold);">${place.count} 次</span>
                    </div>
                    <div class="progress-bar" style="height: 4px;">
                        <div class="progress-fill" style="width:${pct}%"></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateTicker(data) {
        const kpi = data.kpi;
        const social = data.socialRanking?.[0];
        const family = data.familyRanking?.[0];
        const parts = [
            `📊 系統統計 | 總家庭：${kpi.familyCount} 戶`,
            `🔥 今日打卡：${kpi.todayCheckins} 次（累計 ${kpi.totalCheckins} 次）`,
            `📖 學習紀錄：${kpi.totalLearning} 筆`,
            `🌱 友善節點：${kpi.nodeCount} 個`,
            `📻 廣播收聽：${kpi.totalRadioMin} 分鐘`,
            social ? `🏛️ 社團第一：${social.name}（${social.score.toLocaleString()} 分）` : '',
            family ? `🏆 家庭第一：${family.name}（${family.score.toLocaleString()} 分）` : '',
            `⏱️ 更新時間：${data.generatedAt}`,
        ].filter(Boolean);

        const text = parts.join('　　 ·　　 ') + '　　　';
        const el = document.getElementById('ticker-content');
        el.innerHTML = text + text; // 複製一份讓跑馬燈無縫循環
    }

    // ══ 資料載入 ═════════════════════════════════════════════
    // 從 URL 取得 fid
    const URL_PARAMS   = new URLSearchParams(window.location.search);
    const MY_FID       = URL_PARAMS.get('fid') || '';
    let   myFamilyName = '';
    let   mySocialName = '';
    let   myCheckinNodes = new Set();  // 我打卡過的節點 ID

    async function loadData() {
        const statusDot  = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const lastUp     = document.getElementById('last-updated');

        try {
            // 同時抓全台資料 + 個人資料（有 fid 才抓）
            const reqs = [fetch(`${GAS_URL}?action=getNationalStats`, {redirect:'follow'})];
            if (MY_FID) reqs.push(fetch(`${GAS_URL}?action=getFamilyDetail&fid=${encodeURIComponent(MY_FID)}`, {redirect:'follow'}));

            const ress = await Promise.all(reqs);
            const [data, famData] = await Promise.all(ress.map(r => r.json()));

            if (!data.success) throw new Error(data.error || '資料錯誤');

            // 記錄個人資訊
            if (famData && famData.success) {
                myFamilyName = famData.family.familyName;
                mySocialName = famData.family.socialName;
            }

            applyData(data);
            statusDot.style.background  = '#22c55e';
            statusText.textContent      = '資料即時同步';
            lastUp.textContent          = data.generatedAt;

        } catch (err) {
            console.warn('無法連接 GAS，使用 fallback 資料:', err.message);
            // fallback 時若有 fid 也嘗試設定預設值
            if (MY_FID === 'F177124937338') {
                myFamilyName = '陳仕賓';
                mySocialName = '台語文創意園區';
            }
            applyData(FALLBACK_DATA);
            statusDot.style.background  = '#f59e0b';
            statusText.textContent      = 'DEMO 模式（離線資料）';
            lastUp.textContent          = FALLBACK_DATA.generatedAt;
        }
    }

    function applyData(data) {
        renderKPI(data.kpi);
        renderNodes(data.nodes || []);

        const maxSocial = data.socialRanking?.[0]?.score || 1;
        const maxFamily = data.familyRanking?.[0]?.score || 1;
        renderRanking('social-ranking', data.socialRanking, maxSocial, mySocialName);
        renderRanking('family-ranking', data.familyRanking, maxFamily, myFamilyName);
        renderActivityBreakdown(data.activityBreakdown);
        renderTopPlaces(data.topPlaces);
        updateTicker(data);
    }

    // 啟動
    loadData();
    // 每 5 分鐘自動更新
    setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
